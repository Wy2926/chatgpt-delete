<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; width: 280px; margin: 0; padding: 16px; color: #222; }
    h1 { font-size: 15px; margin: 0 0 10px; }
    p { font-size: 13px; color: #666; margin: 0 0 12px; line-height: 1.6; }
    button { width: 100%; padding: 9px; border: none; border-radius: 8px; background: #10a37f; color: #fff; font-size: 14px; cursor: pointer; }
    button:hover { background: #0d8a6c; }
    .tip { font-size: 12px; color: #999; margin-top: 10px; }
  </style>
</head>
<body>
  <h1 id="title"></h1>
  <p id="desc"></p>
  <button id="open"></button>
  <p class="tip" id="tip"></p>
  <script src="popup.js"></script>
</body>
</html>
